<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maintenance Log</title>
<script src="https://kit.fontawesome.com/4c2a8b8f7f.js" crossorigin="anonymous"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #081229;
    color: #e6f1ff;
    height: 100vh;
    overflow: hidden;
}

/* Background Grid */
.background-grid {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveGrid 20s linear infinite;
    z-index: 0;
}

@keyframes moveGrid {
    from { background-position: 0 0; }
    to { background-position: 40px 40px; }
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
    position: relative;
    z-index: 1;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: rgba(0,0,0,0.75);
    border-right: 1px solid rgba(0,255,255,0.2);
    padding: 30px 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 40px;
    color: #00ffff;
    letter-spacing: 2px;
}

.nav-links {
    list-style: none;
}

.nav-links li {
    margin-bottom: 18px;
}

.nav-links a {
    text-decoration: none;
    color: #e6f1ff;
    padding: 10px 12px;
    display: block;
    border-radius: 6px;
    transition: 0.2s;
}

.nav-links a:hover {
    background: rgba(0,255,255,0.1);
    color: #00ffff;
}


/* Main */
.main {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.add-btn {
    background: #00ffff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

/* Log List */
.log-list {
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 15px;
    padding: 25px;
}

.log-card {
    padding: 15px;
    border-bottom: 1px solid rgba(0,255,255,0.1);
    position: relative;
}

.log-card:last-child {
    border-bottom: none;
}

.log-card h4 {
    color: #00ffff;
    margin-bottom: 5px;
}

.delete-btn {
    position: absolute;
    right: 15px;
    top: 15px;
    background: transparent;
    border: 1px solid #ff4d4d;
    color: #ff4d4d;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
}

.delete-btn:hover {
    background: #ff4d4d;
    color: white;
}

/* TOTAL BOX */
.total-box {
    margin-top: 25px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
}

.total-box h3 {
    color: #00ffff;
    margin-bottom: 10px;
}

.total-amount {
    font-size: 28px;
    font-weight: bold;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup-content {
    width: 420px;
    padding: 30px;
    background: #0a192f;
    border-radius: 12px;
    border: 1px solid rgba(0,255,255,0.3);
}

.input-group {
    margin-bottom: 18px;
}

.input-group input,
.input-group select,
.input-group textarea {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #1f2a44;
    border-radius: 6px;
    color: white;
}

textarea {
    resize: none;
    height: 80px;
}

.save-btn {
    width: 100%;
    padding: 10px;
    background: #00ffff;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="background-grid"></div>

<div class="container">

<div class="sidebar">
        <h2>CONTROL</h2>

        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="vehicle_register.html">Fleet Management</a></li>
            <li><a href="trip_dispatcher.html">Dispatch Center</a></li>
            <li><a href="maintenance_log.html">Maintenance & Repair</a></li>
            <li><a href="fuel_expenses.html">Fuel Summary</a></li>
            <li><a href="driver_details.html">Driver Management</a></li>
             <li><a href="analysis.html">Analytics</a></li>
        </ul>
    </div>

<div class="main">
    <div class="top-bar">
        <h1>Maintenance Log</h1>
        <button class="add-btn" onclick="openPopup()">+ Add Maintenance</button>
    </div>

    <div class="log-list" id="logList">
        <h3>Maintenance Entries</h3>
    </div>

    <!-- TOTAL BOX -->
    <div class="total-box">
        <h3>Total Maintenance Cost</h3>
        <div class="total-amount">₹ <span id="totalCost">0</span></div>
    </div>
</div>

</div>

<!-- Popup -->
<div class="popup" id="maintenancePopup">
<div class="popup-content">
    <h3>Add Maintenance Entry</h3>

    <div class="input-group">
        <div id="vehicleType">
            <input type="text" id="vehicleNumber" placeholder="Vehicle Number">
        </div>
    </div>

    <div class="input-group">
        <select id="serviceType">
            <option value="">Select Service Type</option>
            <option>Engine Repair</option>
            <option>Tyre Replacement</option>
            <option>Brake Change</option>
            <option>Oil Change</option>
        </select>
    </div>

    <div class="input-group">
        <textarea id="description" placeholder="Description"></textarea>
    </div>

    <div class="input-group">
        <input type="number" id="cost" placeholder="Incurred Cost (₹)">
    </div>

    <button class="save-btn" onclick="saveEntry()">Save Entry</button>
</div>
</div>

<script>
let total = 0;

function openPopup() {
    document.getElementById("maintenancePopup").style.display = "flex";
}

function closePopup() {
    document.getElementById("maintenancePopup").style.display = "none";
}

function saveEntry() {
    const vehicle = document.getElementById("vehicleNumber").value;
    const service = document.getElementById("serviceType").value;
    const desc = document.getElementById("description").value;
    const cost = parseFloat(document.getElementById("cost").value);

    if (!vehicle || !service || !cost) {
        alert("Please fill required fields.");
        return;
    }

    total += cost;
    document.getElementById("totalCost").textContent = total;

    const logList = document.getElementById("logList");

    const card = document.createElement("div");
    card.className = "log-card";

    card.innerHTML = `
        <h4>${vehicle} - ${service}</h4>
        <p>${desc}</p>
        <p>Cost: ₹ ${cost}</p>
        <button class="delete-btn">Delete</button>
    `;

    card.querySelector(".delete-btn").addEventListener("click", function() {
        total -= cost;
        document.getElementById("totalCost").textContent = total;
        card.remove();
    });

    logList.appendChild(card);
    closePopup();

    document.getElementById("vehicleType").value = "";
    document.getElementById("serviceType").value = "";
    document.getElementById("description").value = "";
    document.getElementById("cost").value = "";
}
</script>

</body>
</html>
