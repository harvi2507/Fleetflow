<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Details</title>
<script src="https://kit.fontawesome.com/4c2a8b8f7f.js" crossorigin="anonymous"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #081229;
    color: #e6f1ff;
    height: 100vh;
    overflow: hidden;
}

/* Background Grid */
.background-grid {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveGrid 20s linear infinite;
    z-index: 0;
}

@keyframes moveGrid {
    from { background-position: 0 0; }
    to { background-position: 40px 40px; }
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
    position: relative;
    z-index: 1;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: rgba(0,0,0,0.75);
    border-right: 1px solid rgba(0,255,255,0.2);
    padding: 30px 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 40px;
    color: #00ffff;
    letter-spacing: 2px;
}

.nav-links {
    list-style: none;
}

.nav-links li {
    margin-bottom: 18px;
}

.nav-links a {
    text-decoration: none;
    color: #e6f1ff;
    padding: 10px 12px;
    display: block;
    border-radius: 6px;
    transition: 0.2s;
}

.nav-links a:hover {
    background: rgba(0,255,255,0.1);
    color: #00ffff;
}

/* Main */
.main {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.add-btn {
    background: #00ffff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

/* Driver List */
.driver-list {
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 15px;
    padding: 25px;
}

.driver-card {
    padding: 15px;
    border-bottom: 1px solid rgba(0,255,255,0.1);
    position: relative;
}

.driver-card:last-child {
    border-bottom: none;
}

.driver-card h4 {
    color: #00ffff;
    margin-bottom: 5px;
}

.delete-btn {
    position: absolute;
    right: 15px;
    top: 15px;
    background: transparent;
    border: 1px solid #ff4d4d;
    color: #ff4d4d;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
}

.delete-btn:hover {
    background: #ff4d4d;
    color: white;
}

/* Summary Box */
.summary-box {
    margin-top: 25px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(0,255,255,0.3);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
}

.summary-box h3 {
    color: #00ffff;
    margin-bottom: 10px;
}

.summary-item {
    font-size: 18px;
    margin: 5px 0;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup-content {
    width: 420px;
    padding: 30px;
    background: #0a192f;
    border-radius: 12px;
    border: 1px solid rgba(0,255,255,0.3);
}

.input-group {
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #1f2a44;
    border-radius: 6px;
    color: white;
}

.input-group input:focus {
    outline: none;
    border-color: #00ffff;
}

.save-btn {
    width: 100%;
    padding: 10px;
    background: #00ffff;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="background-grid"></div>

<div class="container">

<div class="sidebar">
        <h2>CONTROL</h2>

        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="vehicle_register.html">Fleet Management</a></li>
            <li><a href="trip_dispatcher.html">Dispatch Center</a></li>
            <li><a href="maintenance_log.html">Maintenance & Repair</a></li>
            <li><a href="fuel_expenses.html">Fuel Summary</a></li>
            <li><a href="driver_details.html">Driver Management</a></li>
             <li><a href="analysis.html">Analytics</a></li>
        </ul>
    </div>

<div class="main">
    <div class="top-bar">
        <h1>Driver Details</h1>
        <button class="add-btn" onclick="openPopup()">+ Add Driver</button>
    </div>

    <div class="driver-list" id="driverList">
        <h3>Driver Records</h3>
    </div>

    <div class="summary-box">
        <h3>Driver Summary</h3>
        <div class="summary-item">Total Drivers: <span id="totalDrivers">0</span></div>
        <div class="summary-item">Total Trips Completed: <span id="totalTrips">0</span></div>

    </div>
</div>

</div>

<!-- Popup -->
<div class="popup" id="driverPopup">
<div class="popup-content">
    <h3>Add Driver</h3>

    <div class="input-group">
        <input type="text" id="driverName" placeholder="Driver Name">
    </div>

    <div class="input-group">
        <input type="text" id="licenseNumber" placeholder="License Number">
    </div>

    <div class="input-group">
        <input type="date" id="expiryDate">
    </div>

    <div class="input-group">
        <input type="number" id="tripsCompleted" placeholder="Trips Completed">
    </div>
    <div class="input-group">
    <input type="text" id="performance" placeholder="Performance (Good / Average / Poor)">
</div>

<div class="input-group">
    <input type="text" id="status" placeholder="Status (Active / On Leave)">
</div>

    <button class="save-btn" onclick="saveDriver()">Save</button>
</div>
</div>

<script>
let totalDrivers = 0;
let totalTrips = 0;

window.onload = fetchDrivers;

function fetchDrivers() {
  fetch("http://localhost:5000/api/drivers")
    .then(res => res.json())
    .then(drivers => {
      drivers.forEach(addDriverToUI);
    });
}

function openPopup() {
    document.getElementById("driverPopup").style.display = "flex";
}

function closePopup() {
    document.getElementById("driverPopup").style.display = "none";
}

function saveDriver() {
  const name = document.getElementById("driverName").value;
  const license = document.getElementById("licenseNumber").value;
  const expiry = document.getElementById("expiryDate").value;
  const trips = parseInt(document.getElementById("tripsCompleted").value);
  const performance = document.getElementById("performance").value;
  const status = document.getElementById("status").value;

  if (!name || !license || !expiry || isNaN(trips) || !performance || !status) {
    alert("Please fill all fields.");
    return;
  }

  fetch("http://localhost:5000/api/drivers", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, license, expiry, trips, performance, status })
  })
    .then(res => res.json())
    .then(driver => {
      addDriverToUI(driver);
      closePopup();
    });

  document.getElementById("driverName").value = "";
  document.getElementById("licenseNumber").value = "";
  document.getElementById("expiryDate").value = "";
  document.getElementById("tripsCompleted").value = "";
  document.getElementById("performance").value = "";
  document.getElementById("status").value = "";
}
function addDriverToUI(driver) {
  totalDrivers++;
  totalTrips += driver.trips;

  document.getElementById("totalDrivers").textContent = totalDrivers;
  document.getElementById("totalTrips").textContent = totalTrips;

  const list = document.getElementById("driverList");

  const card = document.createElement("div");
  card.className = "driver-card";

  card.innerHTML = `
    <h4>${driver.name}</h4>
    <p>License: ${driver.license}</p>
    <p>Expiry: ${driver.expiry}</p>
    <p>Trips Completed: ${driver.trips}</p>
    <p>Performance: ${driver.performance}</p>
<p>Status: ${driver.status}</p>

    <button class="delete-btn">Delete</button>
  `;

  card.querySelector(".delete-btn").addEventListener("click", () => {
    fetch(`http://localhost:5000/api/drivers/${driver.id}`, {
      method: "DELETE"
    });

    totalDrivers--;
    totalTrips -= driver.trips;
    document.getElementById("totalDrivers").textContent = totalDrivers;
    document.getElementById("totalTrips").textContent = totalTrips;
    card.remove();
  });

  list.appendChild(card);
}
</script>

</body>
</html>
