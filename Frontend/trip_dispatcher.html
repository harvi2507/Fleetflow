<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trip Dispatcher</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #081229;
    color: #e6f1ff;
    height: 100vh;
    overflow: hidden;
}

/* Background */
.background-grid {
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: moveGrid 20s linear infinite;
    z-index: 0;
}

@keyframes moveGrid {
    from { background-position: 0 0; }
    to { background-position: 40px 40px; }
}

.container {
    display: flex;
    height: 100vh;
    position: relative;
    z-index: 1;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: rgba(0,0,0,0.75);
    border-right: 1px solid rgba(0,255,255,0.2);
    padding: 30px 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 40px;
    color: #00ffff;
}

.nav-links {
    list-style: none;
}

.nav-links li {
    margin-bottom: 18px;
}

.nav-links a {
    text-decoration: none;
    color: #e6f1ff;
    padding: 10px 12px;
    display: block;
    border-radius: 6px;
}

.nav-links a:hover {
    background: rgba(0,255,255,0.1);
    color: #00ffff;
}

/* Main */
.main {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.new-trip-btn {
    background: #00ffff;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}

/* Trip List */
.trip-list {
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 15px;
    padding: 25px;
}

.trip-card {
    padding: 20px;
    border-bottom: 1px solid rgba(0,255,255,0.1);
    position: relative;
}

.trip-card:last-child {
    border-bottom: none;
}

.trip-card h4 {
    color: #00ffff;
    margin-bottom: 8px;
}

/* Lifecycle Line */
.lifecycle-line {
    display: flex;
    align-items: center;
    margin: 15px 0;
    position: relative;
}

.lifecycle-line::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 3px;
    background: rgba(255,255,255,0.1);
    z-index: 0;
}

.stage {
    position: relative;
    z-index: 1;
    width: 33%;
    text-align: center;
    font-size: 12px;
    font-weight: bold;
}

.stage span {
    display: inline-block;
    padding: 6px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
}

.stage.active span {
    background: #00ffff;
    color: black;
}

.stage.completed span {
    background: #00ff99;
    color: black;
}

/* Buttons */
.lifecycle-btn,
.cancel-btn,
.delete-btn {
    margin-top: 10px;
    margin-right: 8px;
    background: transparent;
    border: 1px solid #00ffff;
    color: #00ffff;
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
}

.lifecycle-btn:hover {
    background: #00ffff;
    color: black;
}

.cancel-btn {
    border: 1px solid #ff4d4d;
    color: #ff4d4d;
}

.cancel-btn:hover {
    background: #ff4d4d;
    color: white;
}

.delete-btn {
    border: 1px solid orange;
    color: orange;
}

.delete-btn:hover {
    background: orange;
    color: black;
}

/* Popup */
.popup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.popup-content {
    width: 420px;
    padding: 30px;
    background: #0a192f;
    border-radius: 12px;
    border: 1px solid rgba(0,255,255,0.3);
}

.input-group {
    margin-bottom: 18px;
}

.input-group input,
.input-group select,
.input-group textarea {
    width: 100%;
    padding: 10px;
    background: #0f1f3d;
    border: 1px solid #00ffff;
    border-radius: 6px;
    color: white;
}

textarea {
    resize: none;
    height: 80px;
}

.save-btn {
    width: 100%;
    padding: 10px;
    background: #00ffff;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="background-grid"></div>

<div class="container">

<div class="sidebar">
    <h2>CONTROL</h2>
    <ul class="nav-links">
       <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="vehicle_register.html">Fleet Management</a></li>
            <li><a href="trip_dispatcher.html">Dispatch Center</a></li>
            <li><a href="maintenance_log.html">Maintenance & Repair</a></li>
            <li><a href="fuel_expenses.html">Fuel Summary</a></li>
            <li><a href="driver_details.html">Driver Management</a></li>
             <li><a href="analysis.html">Analytics</a></li>
    </ul>
</div>

<div class="main">
    <div class="top-bar">
        <h1>Trip Dispatcher</h1>
        <button class="new-trip-btn" onclick="openPopup()">+ New Trip</button>
    </div>

    <div class="trip-list" id="tripList">
        <h3>Trips</h3>
    </div>
</div>

</div>

<div class="popup" id="tripPopup">
<div class="popup-content">
    <h3>Create New Trip</h3>

    <div class="input-group">
        <select id="vehicleType">
            <option value="">Select Vehicle</option>
            <option value="Truck">Truck</option>
            <option value="Van">Van</option>
        </select>
    </div>

    <div class="input-group">
        <input type="text" id="origin" placeholder="Origin">
    </div>

    <div class="input-group">
        <input type="text" id="destination" placeholder="Destination">
    </div>

    <div class="input-group">
        <input type="number" id="distance" placeholder="Distance (km)">
    </div>

    <div class="input-group">
        <input type="number" id="weight" placeholder="Weight (kg)">
    </div>

    <div class="input-group">
        <textarea id="notes" placeholder="Notes"></textarea>
    </div>

    <button class="save-btn" onclick="saveTrip()">Save Trip</button>
</div>
</div>

<script>
function openPopup() {
    document.getElementById("tripPopup").style.display = "flex";
}

function closePopup() {
    document.getElementById("tripPopup").style.display = "none";
}

function saveTrip() {
    function saveTrip() {
    const vehicle = document.getElementById("vehicleType").value;
    const origin = document.getElementById("origin").value;
    const destination = document.getElementById("destination").value;
    const distance = document.getElementById("distance").value;
    const weight = parseFloat(document.getElementById("weight").value);
    const notes = document.getElementById("notes").value;

    if (!vehicle || !origin || !destination || !distance || !weight) {
        alert("Fill all fields");
        return;
    }

    // ⬇️ SEND DATA TO BACKEND (instead of creating card here)
    fetch("http://localhost:3000/api/trips", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            vehicle,
            origin,
            destination,
            distance,
            weight,
            notes
        })
    })
    .then(res => res.json())
    .then(() => {
        closePopup();
        loadTrips(); // reload trips from server
    })
    .catch(err => console.error(err));

    // clear form
    document.getElementById("vehicleType").value = "";
    document.getElementById("origin").value = "";
    document.getElementById("destination").value = "";
    document.getElementById("distance").value = "";
    document.getElementById("weight").value = "";
    document.getElementById("notes").value = "";
}
}
function loadTrips() {
    fetch("http://localhost:3000/api/trips")
        .then(res => res.json())
        .then(trips => {
            const tripList = document.getElementById("tripList");
            tripList.innerHTML = "<h3>Trips</h3>";

            trips.forEach(trip => {
                const card = document.createElement("div");
                card.className = "trip-card";

                card.innerHTML = `
                    <h4>${trip.vehicle} | ${trip.origin} → ${trip.destination}</h4>
                    <p>Distance: ${trip.distance} km</p>
                    <p>Weight: ${trip.weight} kg</p>
                    <p>Notes: ${trip.notes || "-"}</p>

                    <div class="lifecycle-line">
                        <div class="stage ${trip.stage === 0 ? "active" : trip.stage > 0 ? "completed" : ""}"><span>Dispatched</span></div>
                        <div class="stage ${trip.stage === 1 ? "active" : trip.stage > 1 ? "completed" : ""}"><span>In Transit</span></div>
                        <div class="stage ${trip.stage === 2 ? "active" : ""}"><span>Delivered</span></div>
                    </div>

                    <button onclick="nextStage(${trip.id})" class="lifecycle-btn">Next Stage</button>
                    <button onclick="cancelTrip(${trip.id})" class="cancel-btn">Cancel</button>
                    <button onclick="deleteTrip(${trip.id})" class="delete-btn">Delete</button>
                `;

                if (trip.status === "cancelled") {
                    card.style.opacity = "0.6";
                }

                tripList.appendChild(card);
            });
        });
}
window.onload = loadTrips;
</script>

</body>
</html>
