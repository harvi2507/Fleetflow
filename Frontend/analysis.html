<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fleet Financial Analysis</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#2b0f14,#3a1418,#1f0b0f);
    color:#ffe6e6;
    min-height:100vh;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    width:600px;
    height:600px;
    background:radial-gradient(circle,rgba(255,0,0,0.15),transparent 70%);
    top:-200px;
    right:-200px;
    z-index:0;
}

.main{
    position:relative;
    z-index:1;
    padding:60px;
    max-width:1200px;
    margin:auto;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:50px;
}

.export-buttons button{
    background:linear-gradient(45deg,#ff4d4d,#ff1a1a);
    border:none;
    padding:10px 18px;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-left:12px;
    transition:0.3s;
}

.export-buttons button:hover{
    transform:translateY(-2px);
    box-shadow:0 0 15px rgba(255,0,0,0.4);
}

.revenue-card{
    background:rgba(255,0,0,0.05);
    border:1px solid rgba(255,0,0,0.3);
    padding:25px;
    border-radius:15px;
    margin-bottom:40px;
    backdrop-filter:blur(10px);
}

.revenue-card h2{
    margin-bottom:15px;
    color:#ff4d4d;
}

.revenue-card input{
    width:260px;
    padding:12px;
    background:#1f0b0f;
    border:1px solid #ff4d4d;
    border-radius:8px;
    color:white;
    margin-right:15px;
}

.revenue-card button{
    padding:12px 18px;
    background:#ff4d4d;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.analytics-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,0,0,0.2);
    padding:30px;
    border-radius:18px;
    backdrop-filter:blur(15px);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(255,0,0,0.2);
}

.card h3{
    margin-bottom:15px;
    font-size:18px;
    color:#ff8080;
}

.metric{
    font-size:34px;
    font-weight:700;
    background:linear-gradient(90deg,#ff4d4d,#ff9999);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.profit-positive{
    background:linear-gradient(90deg,#00ff99,#00cc66);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.profit-negative{
    background:linear-gradient(90deg,#ff0000,#ff6666);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.small{
    font-size:13px;
    opacity:0.7;
    margin-top:6px;
}
</style>
</head>

<body>

<div class="main">

<div class="top-bar">
    <h1>Financial Overview</h1>
    <div class="export-buttons">
        <button onclick="exportCSV()">Export CSV</button>
        <button onclick="exportPDF()">Export PDF</button>
    </div>
</div>

<div class="revenue-card">
    <h2>Enter Monthly Revenue</h2>
    <input type="number" id="revenueInput" placeholder="₹ Enter Revenue">
    <button onclick="calculateFinancials()">Generate Report</button>
</div>

<div class="analytics-grid">

    <div class="card">
        <h3>Total Revenue</h3>
        <div class="metric">₹ <span id="revenueBox">0</span></div>
        <div class="small">User Input</div>
    </div>

    <div class="card">
        <h3>Operational Cost</h3>
        <div class="metric">₹ <span id="costBox">0</span></div>
        <div class="small">Fuel + Maintenance</div>
    </div>

    <div class="card">
        <h3>Net Profit</h3>
        <div class="metric" id="profitMetric">₹ <span id="profitBox">0</span></div>
        <div class="small">Revenue − Cost</div>
    </div>

    <div class="card">
        <h3>Fuel Efficiency</h3>
        <div class="metric"><span id="efficiencyBox">0</span> km/L</div>
        <div class="small">Total KM ÷ Total Litres</div>
    </div>

</div>

</div>

<script>
function calculateFinancials(){

    const revenue = parseFloat(document.getElementById("revenueInput").value) || 0;
    const fuelCost = parseFloat(localStorage.getItem("totalFuelExpense")) || 0;
    const maintenanceCost = parseFloat(localStorage.getItem("totalMaintenanceCost")) || 0;
    const totalKm = parseFloat(localStorage.getItem("totalDistance")) || 0;
    const totalLitres = parseFloat(localStorage.getItem("totalFuelLitres")) || 0;

    const operationalCost = fuelCost + maintenanceCost;
    const netProfit = revenue - operationalCost;
    const efficiency = totalLitres > 0 ? (totalKm / totalLitres).toFixed(2) : 0;

    document.getElementById("revenueBox").textContent = revenue.toLocaleString();
    document.getElementById("costBox").textContent = operationalCost.toLocaleString();
    document.getElementById("profitBox").textContent = netProfit.toLocaleString();
    document.getElementById("efficiencyBox").textContent = efficiency;

    const profitMetric = document.getElementById("profitMetric");

    if(netProfit >= 0){
        profitMetric.classList.remove("profit-negative");
        profitMetric.classList.add("profit-positive");
    }else{
        profitMetric.classList.remove("profit-positive");
        profitMetric.classList.add("profit-negative");
    }
}

function exportCSV(){
    alert("CSV Export triggered (sample)");
}

function exportPDF(){
    alert("PDF Export triggered (sample)");
}
</script>

</body>
</html>
